<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>zad 5</title>
  </head>
  <body>
    <script>
      function przyblizPi(n) {
        let suma = 0

        for (let i = 0; i < n; i++) {
          // Obliczamy mianownik: 1, 3, 5, 7...
          let mianownik = 2 * i + 1

          // Zmieniamy znak: dla i=0 (plus), dla i=1 (minus), dla i=2 (plus)...
          if (i % 2 === 0) {
            suma += 1 / mianownik
          } else {
            suma -= 1 / mianownik
          }
        }

        // Na koniec mnożymy całość przez 4 zgodnie ze wzorem
        let wynik = 4 * suma

        console.log(`Przybliżenie PI dla n=${n}:`, wynik)
      }

      // Przykład użycia:
      przyblizPi(10) // Wynik: 3.2323...
      przyblizPi(100) // Wynik: 3.1315...
      przyblizPi(1000000) // Wynik: 3.141591... (im większe n, tym dokładniej)
    </script>
  </body>
</html>
