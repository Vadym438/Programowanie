<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>zad 6</title>
  </head>
  <body>
    <script>
      function rysujChoinke(n) {
        if (n <= 0) {
          console.log('Wysokość musi być większa od 0.')
          return
        }

        for (let i = 1; i <= n; i++) {
          // 1. Obliczamy liczbę spacji: na samej górze najwięcej, na dole zero
          let spacje = ' '.repeat(n - i)

          // 2. Obliczamy liczbę gwiazdek: 1, 3, 5, 7... (wzór: 2 * i - 1)
          let gwiazdki = '*'.repeat(2 * i - 1)

          // 3. Składamy wiersz i wypisujemy w konsoli
          console.log(spacje + gwiazdki)
        }
      }

      // Przykład użycia:
      rysujChoinke(5)
    </script>
  </body>
</html>
