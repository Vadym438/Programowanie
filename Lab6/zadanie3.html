<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <title>Aktualny czas</title>
  </head>
  <body>
    <h1>Aktualny czas w Polsce:</h1>
    <p id="czas">Ładowanie...</p>

    <script>
      fetch('https://timeapi.io/api/Time/current/zone?timeZone=Europe/Warsaw')
        .then(response => response.json())
        .then(data => {
          const godzina = data.hour.toString().padStart(2, '0')
          const minuta = data.minute.toString().padStart(2, '0')
          const sekunda = data.seconds.toString().padStart(2, '0')

          document.getElementById('czas').textContent = `${godzina}:${minuta}:${sekunda}`
        })
        .catch(error => {
          document.getElementById('czas').textContent = 'Błąd pobierania czasu'
          console.error(error)
        })
    </script>
  </body>
</html>
