<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <title>Dzielenie liczb</title>
  </head>
  <body>
    <h2>Dzielenie dwóch liczb</h2>

    <input type="text" id="num1" placeholder="Podaj pierwszą liczbę" />
    <input type="text" id="num2" placeholder="Podaj drugą liczbę" />
    <button onclick="divide()">Podziel</button>

    <p id="result"></p>

    <script>
      function divide() {
        const result = document.getElementById('result')

        try {
          let a = parseFloat(document.getElementById('num1').value)
          let b = parseFloat(document.getElementById('num2').value)

          if (isNaN(a) || isNaN(b)) {
            throw 'Wprowadź poprawne liczby!'
          }

          if (b === 0) {
            throw 'Nie można dzielić przez zero!'
          }

          result.innerText = 'Wynik: ' + a / b
        } catch (error) {
          result.innerText = 'Błąd: ' + error
        }
      }
    </script>
  </body>
</html>
